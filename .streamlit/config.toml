# Tema do app — trava o modo escuro e usa a paleta validada pela skill
# dataviz (ver app/streamlit_app.py, CATEGORICAL_PALETTE) em vez do
# vermelho/rosa padrão do Streamlit, para os filtros da sidebar (chips do
# multiselect, slider, botões, links) combinarem com as cores dos gráficos.
[theme]
base = "dark"
primaryColor = "#3987e5"
backgroundColor = "#0d0d0d"
secondaryBackgroundColor = "#1a1a19"
textColor = "#ffffff"
font = "sans serif"
